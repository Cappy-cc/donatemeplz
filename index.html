<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>donate me plz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: black;
            margin-bottom: 10px;
        }
        
        h2 {
            color: black;
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
        }
        
        /* Sekcja kotów */
        .cats-section {
            margin: 40px 0;
        }
        
        .cats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .cat-card {
            text-align: center;
            padding: 10px;
        }
        
        .cat-gif {
            width: 100%;
            max-width: 180px;
            height: auto;
            border-radius: 8px;
        }
        
        /* Przycisk */
        .custom-button {
            font-size: 24px;
            padding: 15px 30px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            display: block;
            margin: 30px auto 0;
            width: fit-content;
        }
        
        .custom-button:hover {
            transform: scale(1.05);
            background-color: #cc0000;
        }
        
        /* Responsywność */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .cats-grid {
                gap: 15px;
            }
            .custom-button {
                font-size: 20px;
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>donate me plz</h1>
        <h2>https://tipply.pl/@cappy67mango</h2>
        
        <!-- Przycisk do pieca -->
        <a href="https://tipply.pl/@cappy67mango">
            <button class="custom-button">Idopieca</button>
        </a>
        
        <!-- Sekcja z kotami -->
        <div class="cats-section">
            <div class="cats-grid">
                <!-- Maxwell -->
                <div class="cat-card">
                    <img class="cat-gif" src="https://media.tenor.com/_tUuI9h75O0AAAAC/maxwell-kocykvr.gif" alt="Maxwell kot">
                </div>
                
                <!-- Spinning Cat -->
                <div class="cat-card">
                    <img class="cat-gif" src="https://media.tenor.com/9r9r9r9r9r9AAAAC/spinning-cat.gif" alt="wirujący kot">
                </div>
                
                <!-- Oiiaoiia Cat -->
                <div class="cat-card">
                    <img class="cat-gif" src="https://media.tenor.com/3r4rVWr0rXkAAAAC/cat-oiiaoiia.gif" alt="kot oiiaoiia">
                </div>
                
                <!-- Cool White Cat -->
                <div class="cat-card">
                    <img class="cat-gif" src="https://media.tenor.com/0F0F0F0F0F0AAAAC/cool-fun-white-cat.gif" alt="tańczący biały kot">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
