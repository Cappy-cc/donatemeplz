<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>donate me plz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c2c2c;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #4a4a4a;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #000000;
            margin-bottom: 10px;
        }
        
        h2 {
            color: #000000;
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
        }
        
        /* Sekcja kotów */
        .cats-section {
            margin: 40px 0;
        }
        
        h3 {
            text-align: center;
            color: #000000;
            margin-bottom: 20px;
        }
        
        .cats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .cat-card {
            background-color: #5a5a5a;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .cat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .cat-gif {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 16px;
            margin-bottom: 15px;
        }
        
        .cat-name {
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            margin-top: 10px;
        }
        
        .cat-desc {
            font-size: 13px;
            color: #000000;
            margin-top: 8px;
            line-height: 1.4;
        }
        
        /* Przycisk */
        .custom-button {
            font-size: 24px;
            padding: 15px 30px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            display: block;
            margin: 30px auto 0;
            width: fit-content;
        }
        
        .custom-button:hover {
            transform: scale(1.05);
            background-color: #cc0000;
        }
        
        /* Responsywność */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .cats-grid {
                gap: 15px;
            }
            .custom-button {
                font-size: 20px;
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>donate me plz</h1>
        <h2>https://tipply.pl/@cappy67mango</h2>
        
        <!-- Przycisk do pieca -->
        <a href="https://tipply.pl/@cappy67mango">
            <button class="custom-button">Idopieca</button>
        </a>
        
        <!-- Sekcja z kotami -->
        <div class="cats-section">
            <h3>🐈 NASZE KOCIAKI 🐈</h3>
            <div class="cats-grid">
                <!-- Maxwell -->
                <div class="cat-card">
                    <img class="cat-gif" src="https://media.tenor.com/_tUuI9h75O0AAAAC/maxwell-kocykvr.gif" alt="Maxwell kot">
                    <div class="cat-name">Maxwell</div>
                    <div class="cat-desc">Czarno-biały elegant</div>
                </div>
                
                <!-- Spinning Cat (wirujący) -->
                <div class="cat-card">
                    <img class="cat-gif" src="https://media.tenor.com/9r9r9r9r9r9AAAAC/spinning-cat.gif" alt="wirujący kot">
                    <div class="cat-name">Wirujący Mistrz</div>
                    <div class="cat-desc">Kręci się w kółko</div>
                </div>
                
                <!-- Oryginalny Oiiaoiia Cat -->
                <div class="cat-card">
                    <img class="cat-gif" src="https://media.tenor.com/3r4rVWr0rXkAAAAC/cat-oiiaoiia.gif" alt="kot oiiaoiia">
                    <div class="cat-name">Oiiaoiia Cat</div>
                    <div class="cat-desc">Wiruje w rytm muzyki</div>
                </div>
                
                <!-- Cool White Cat Dance -->
                <div class="cat-card">
                    <img class="cat-gif" src="https://media.tenor.com/0F0F0F0F0F0AAAAC/cool-fun-white-cat.gif" alt="tańczący biały kot">
                    <div class="cat-name">Cool Dancer</div>
                    <div class="cat-desc">Biały tancerz</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
